<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Infinity Scores</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--ink:#0A0C14;
  --s1:#12151E;--s2:#181C28;--s3:#1E2230;
  --br:rgba(201,168,76,0.2);--br2:rgba(255,255,255,0.07);
  --tx:#E8E2D4;--mu:#5A6170;--ac:#4FC3A1;
  --win:#22c55e;--loss:#a855f7;--r:12px;
}
html,body{min-height:100vh;background:var(--ink);color:var(--tx);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto}
.screen{display:none}.screen.active{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--br2);min-height:52px;position:sticky;top:0;background:var(--ink);z-index:10;gap:10px}
.back-btn{display:none;width:34px;height:34px;border-radius:50%;background:var(--s2);border:0.5px solid var(--br2);align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--gold);flex-shrink:0}
.back-btn.show{display:flex}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold-l)}
.topbar-logo span{color:var(--ac)}
.topbar-right{margin-left:auto;text-align:right}
.topbar-vib{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.topbar-date{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}

/* HOME - TOP PICKS */
.home-vib{padding:20px 16px;background:linear-gradient(180deg,rgba(34,197,94,0.05) 0%,transparent 100%);border-bottom:0.5px solid var(--br2)}
.home-vib-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.home-vib-num{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:1}
.home-vib-info .home-vib-label{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:2px}
.home-vib-info .home-vib-meaning{font-size:15px;color:var(--tx);margin-top:4px;line-height:1.4}
.home-vib-info .home-vib-date{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:4px}
.picks-section{padding:12px 16px 6px}
.picks-title{font-size:10px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.picks-title .badge{font-size:9px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.over-badge{background:rgba(34,197,94,0.15);color:var(--win);border:0.5px solid var(--win)}
.under-badge{background:rgba(168,85,247,0.15);color:var(--loss);border:0.5px solid var(--loss)}
.pick-card{background:var(--s2);border-radius:10px;padding:12px 14px;margin:0 0 8px;display:flex;align-items:center;gap:10px;border:0.5px solid var(--br2);transition:all .2s}
.pick-card.hot{border-color:rgba(34,197,94,0.3);box-shadow:0 0 12px rgba(34,197,94,0.08)}
.pick-card.cold{border-color:rgba(168,85,247,0.3);box-shadow:0 0 12px rgba(168,85,247,0.08)}
.pick-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;flex-shrink:0}
.pick-name{font-size:13px;font-weight:500;color:var(--tx)}
.pick-team{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.pick-right{margin-left:auto;text-align:right}
.pick-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.pick-label{font-size:9px;font-family:'DM Mono',monospace;margin-top:2px}
.pick-vib{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;flex-shrink:0}
.picks-loading{text-align:center;padding:30px;color:var(--mu);font-size:11px;font-family:'DM Mono',monospace}

/* NAV TABS */
.nav-tabs{display:flex;border-bottom:0.5px solid var(--br2);background:var(--s1)}
.nav-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.nav-tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* TEAMS */
.teams-header{padding:10px 14px;background:var(--s2);border-bottom:0.5px solid var(--br2);display:flex;align-items:center;gap:10px}
.league-badge{background:rgba(232,24,40,0.15);border:0.5px solid rgba(232,24,40,0.3);color:#E81828;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:4px 10px;border-radius:20px}
.search-wrap{padding:10px 14px;border-bottom:0.5px solid var(--br2)}
.search-inp{width:100%;background:var(--s2);border:0.5px solid var(--br2);color:var(--tx);padding:9px 14px;border-radius:8px;font-size:14px}
.search-inp::placeholder{color:var(--mu)}
.teams-list{padding:8px 12px;display:flex;flex-direction:column;gap:7px}
.team-row{background:var(--s2);border:0.5px solid var(--br2);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.team-row:hover,.team-row:active{border-color:var(--br);transform:translateX(2px)}
.team-info{flex:1;min-width:0}
.team-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-div{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.vib-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;flex-shrink:0}

/* TEAM DETAIL */
.team-hero{padding:16px;border-bottom:0.5px solid var(--br2)}
.team-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.team-hero-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold-l)}
.team-hero-div{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.best-worst-row{display:flex;gap:8px;margin-top:10px}
.bw-chip{flex:1;padding:8px 10px;border-radius:8px;text-align:center}
.bw-chip-label{font-size:8px;font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:4px}
.bw-chip-num{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.bw-chip-sub{font-size:9px;font-family:'DM Mono',monospace;margin-top:2px}

/* TODAY VIB CARD */
.sec-label{font-size:10px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:2px;padding:14px 16px 8px}
.today-vib-card{background:var(--s1);border:0.5px solid var(--br);border-radius:12px;padding:14px;margin:0 12px 10px}
.tvc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.tvc-num{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1}
.tvc-label{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px}
.tvc-meaning{font-size:13px;color:var(--tx);margin-top:3px}
.tvc-record{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tvc-wl{font-family:'Bebas Neue',sans-serif;font-size:26px}
.tvc-pct{font-size:12px;color:var(--mu);font-family:'DM Mono',monospace}
.win-bar-wrap{border-radius:6px;overflow:hidden;height:8px;background:rgba(168,85,247,0.25);margin-bottom:5px}
.win-bar-fill{height:100%;border-radius:6px;transition:width .7s ease}
.win-bar-label{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace}
.season-divider{border-top:0.5px solid var(--br2);margin:10px 0;padding-top:10px}
.season-tag{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}

/* VIB TABS */
.vib-tabs-wrap{padding:0 12px 10px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.vib-tabs-wrap::-webkit-scrollbar{display:none}
.vib-tab{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;cursor:pointer;border:1.5px solid transparent;flex-shrink:0;transition:all .15s}
.vib-tab.active{border-color:#fff;transform:scale(1.15)}

/* PERSON CARD */
.person-card{margin:0 12px 8px;background:var(--s2);border:0.5px solid var(--br2);border-radius:var(--r);overflow:hidden;transition:all .15s}
.person-card:hover{border-color:var(--br)}
.pc-top{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.pc-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;flex-shrink:0}
.pc-name{font-size:15px;font-weight:500}
.pc-meta{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px}
.pc-footer{padding:10px 14px;border-top:0.5px solid var(--br2);display:flex;gap:8px}
.act-btn{flex:1;padding:8px 4px;border-radius:8px;border:0.5px solid var(--br);background:transparent;color:var(--gold);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;text-align:center;transition:all .15s}
.act-btn:hover{background:rgba(201,168,76,0.1)}
.act-btn.primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.dest-chip{background:var(--s1);border:0.5px solid var(--br);border-radius:8px;padding:6px 10px;text-align:center}
.dest-chip-label{font-size:8px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px}
.dest-chip-num{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1.1}

/* PLAYER ROW */
.player-row{margin:0 12px 7px;background:var(--s2);border:0.5px solid var(--br2);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.player-row:hover{border-color:var(--br)}
.player-row.hot{border-color:rgba(34,197,94,0.35);box-shadow:0 0 10px rgba(34,197,94,0.07)}
.player-row.cold{border-color:rgba(168,85,247,0.35);box-shadow:0 0 10px rgba(168,85,247,0.07)}
.pl-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;flex-shrink:0}
.pl-name{font-size:13px;font-weight:500}
.pl-meta{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.hot-cold-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}
.hcb-hot{background:rgba(34,197,94,0.15);color:var(--win)}
.hcb-cold{background:rgba(168,85,247,0.15);color:var(--loss)}

/* REPORT */
.report-hdr{padding:16px;border-bottom:0.5px solid var(--br2)}
.rh-person{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rh-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0}
.rh-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold-l)}
.rh-meta{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.vib-today-card{background:var(--s2);border:0.5px solid var(--br);border-radius:10px;padding:14px;display:flex;align-items:center;gap:16px}
.vtc-num{font-family:'Bebas Neue',sans-serif;font-size:58px;line-height:1}
.vtc-label{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px}
.vtc-meaning{font-size:13px;color:var(--tx);margin-top:4px;line-height:1.5}
.vtc-formula{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:5px}
/* Prediction box */
.pred-box{margin:10px 0 0;padding:10px 12px;border-radius:8px;display:flex;align-items:center;gap:10px}
.pred-box.high{background:rgba(34,197,94,0.12);border:0.5px solid rgba(34,197,94,0.3)}
.pred-box.low{background:rgba(168,85,247,0.12);border:0.5px solid rgba(168,85,247,0.3)}
.pred-box.neutral{background:rgba(90,97,112,0.15);border:0.5px solid rgba(90,97,112,0.3)}
.pred-icon{font-size:20px}
.pred-text{font-size:12px;font-weight:500}
.pred-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;margin-left:auto}
.season-tabs{display:flex;gap:8px;padding:12px 16px 0}
.stab{flex:1;padding:8px;border-radius:8px;border:0.5px solid var(--br2);text-align:center;cursor:pointer;font-size:12px;color:var(--mu);font-family:'DM Mono',monospace;transition:all .15s}
.stab.on{border-color:var(--gold);background:rgba(201,168,76,0.1);color:var(--gold)}
.stats-wrap{padding:12px}
.stats-info{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-bottom:8px;line-height:1.5}
.stats-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--s2);border-radius:10px;overflow:hidden;border:0.5px solid var(--br2)}
.stats-table th{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px;padding:8px 5px;text-align:center;border-bottom:0.5px solid var(--br2)}
.stats-table td{padding:8px 5px;text-align:center;border-bottom:0.5px solid rgba(255,255,255,0.03)}
.stats-table tr.best td{background:rgba(34,197,94,0.08)}
.stats-table tr.worst td{background:rgba(168,85,247,0.08)}
.stats-table tr.today-row td{outline:1px solid rgba(201,168,76,0.5)}
.stats-table tr:last-child td{border-bottom:none}
.vib-n{font-family:'Bebas Neue',sans-serif;font-size:18px}
.today-tag{font-size:8px;color:var(--gold);font-family:'DM Mono',monospace;display:block;line-height:1.2}
.trend-chip{display:inline-block;font-size:9px;padding:2px 6px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:1px}
.over{background:rgba(34,197,94,0.15);color:var(--win)}
.under{background:rgba(168,85,247,0.15);color:var(--loss)}
.even{background:rgba(90,97,112,0.2);color:var(--mu)}

/* VS */
.vs-controls{padding:12px 16px;border-bottom:0.5px solid var(--br2);display:flex;gap:8px;align-items:center}
.vs-select{flex:1;background:var(--s2);border:0.5px solid var(--br2);color:var(--tx);padding:9px 12px;border-radius:8px;font-size:13px}
.vs-go{background:var(--gold);color:#000;border:none;padding:9px 16px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer}
.vs-advantage{margin:12px 12px 0;padding:12px 14px;border-radius:10px;display:flex;align-items:center;gap:10px}
.vs-advantage.a{background:rgba(34,197,94,0.1);border:0.5px solid rgba(34,197,94,0.3)}
.vs-advantage.b{background:rgba(168,85,247,0.1);border:0.5px solid rgba(168,85,247,0.3)}
.vs-advantage.neutral{background:rgba(90,97,112,0.1);border:0.5px solid rgba(90,97,112,0.3)}
.vs-adv-icon{font-size:22px}
.vs-adv-text{font-size:13px;font-weight:500}
.vs-adv-sub{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.vs-matchup{display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--br2)}
.vs-team{flex:1;text-align:center}
.vs-team-logo{width:48px;height:48px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.vs-team-logo img{width:38px;height:38px;object-fit:contain}
.vs-team-label{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.vs-record{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-top:2px}
.vs-divider{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--mu);padding:0 8px}
.vs-sub{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;padding:8px 16px 4px}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:100;align-items:flex-end;justify-content:center}
.modal.show{display:flex;animation:fi .15s ease}
.modal-box{background:var(--s1);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px;border-top:0.5px solid var(--br)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold-l);margin-bottom:14px;letter-spacing:1px}
.modal-date{width:100%;background:var(--s2);border:0.5px solid var(--br);color:var(--tx);padding:10px 14px;border-radius:8px;font-family:'DM Mono',monospace;font-size:14px;margin-bottom:14px}
.modal-btns{display:flex;gap:8px}
.mbtn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer}
.mbtn.cancel{background:var(--s2);color:var(--mu)}
.mbtn.today-btn{background:var(--s3);color:var(--gold);border:0.5px solid var(--br)}
.mbtn.confirm{background:var(--gold);color:#000}

/* UTILS */
.loading{text-align:center;padding:24px;color:var(--mu);font-size:12px;font-family:'DM Mono',monospace}
.err{margin:12px;padding:10px 12px;background:rgba(224,92,92,0.1);border:0.5px solid rgba(224,92,92,0.3);border-radius:8px;font-size:11px;color:#E05C5C;font-family:'DM Mono',monospace}
.live-pill{display:inline-block;background:rgba(79,195,161,0.12);color:var(--ac);font-size:9px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;border:0.5px solid var(--ac);margin-left:6px}
input:focus,select:focus{outline:none;border-color:var(--gold)!important}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" id="back-btn">←</div>
  <div class="topbar-logo">INFINITY <span>SCORES</span></div>
  <div class="topbar-right">
    <div class="topbar-vib" id="topbar-vib"></div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>
</div>

<!-- S0: HOME - TOP PICKS -->
<div class="screen active" id="s-home">
  <div class="home-vib" id="home-vib"></div>
  <div class="nav-tabs">
    <div class="nav-tab on" onclick="showPicksSection('over',this)">🔥 TOP OVER</div>
    <div class="nav-tab" onclick="showPicksSection('under',this)">🔻 TOP UNDER</div>
    <div class="nav-tab" onclick="showTeams()">⚾ EQUIPOS</div>
  </div>
  <div id="picks-content"><div class="picks-loading">Calculando picks del día...</div></div>
</div>

<!-- S1: TEAMS -->
<div class="screen" id="s-teams">
  <div class="teams-header">
    <div class="league-badge">MLB</div>
    <div>
      <div style="font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px">VIBRACIÓN HOY</div>
      <div id="teams-vib-txt" style="font-size:11px;margin-top:1px"></div>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-inp" type="text" id="search-inp" placeholder="🔍 Buscar equipo...">
  </div>
  <div class="teams-list" id="teams-list"><div class="loading">Cargando equipos</div></div>
</div>

<!-- S2: TEAM DETAIL -->
<div class="screen" id="s-team">
  <div id="team-hero"></div>
  <div class="sec-label">VIBRACIÓN DEL EQUIPO HOY</div>
  <div id="today-vib-card-wrap"></div>
  <div style="padding:0 12px 4px">
    <div style="font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:8px">EXPLORAR OTRAS VIBRACIONES</div>
    <div class="vib-tabs-wrap" id="vib-tabs"></div>
  </div>
  <div class="sec-label">MANAGER</div>
  <div id="mgr-card"></div>
  <div class="sec-label">JUGADORES</div>
  <div id="players-list"></div>
  <div style="height:30px"></div>
</div>

<!-- S3: REPORT -->
<div class="screen" id="s-report">
  <div class="report-hdr" id="report-hdr"></div>
  <div class="season-tabs">
    <div class="stab" data-s="2025">TEMPORADA 2025</div>
    <div class="stab on" data-s="2026">2026 ★ LIVE</div>
  </div>
  <div id="report-content"><div class="loading">Cargando stats</div></div>
  <div style="height:30px"></div>
</div>

<script>
const API='https://infinity-sport-backend-production.up.railway.app/api';
const VC={1:'#E05C5C',2:'#E8874A',3:'#D4A017',4:'#4FC3A1',5:'#5B8FE8',6:'#C084FC',7:'#34D399',8:'#F87171',9:'#FBBF24'};
const VB={1:'rgba(224,92,92,.18)',2:'rgba(232,135,74,.18)',3:'rgba(212,160,23,.18)',4:'rgba(79,195,161,.18)',5:'rgba(91,143,232,.18)',6:'rgba(192,132,252,.18)',7:'rgba(52,211,153,.18)',8:'rgba(248,113,113,.18)',9:'rgba(251,191,36,.18)'};
const VM={1:'Liderazgo · Inicio',2:'Cooperación · Balance',3:'Creatividad · Energía',4:'Estabilidad · Disciplina',5:'Libertad · Cambio',6:'Armonía · Protección',7:'Análisis · Precisión',8:'Poder · Resultados',9:'Sabiduría · Cierre'};

// ── NUMEROLOGY ────────────────────────────────────────────
function red(n){n=Math.abs(Math.round(n));while(n>9){n=String(n).split('').reduce((a,d)=>a+parseInt(d),0);}return n===0?1:n;}
function sd(s){return String(s).split('T')[0].replace(/\D/g,'').split('').reduce((a,d)=>a+parseInt(d),0);}
function vib(b,t){if(!b||!t)return 1;return red(sd(b)+sd(t));}
function dest(b){if(!b)return 1;return red(sd(b));}
function vibDay(d){if(!d)return 1;return red(sd(d));}
function today(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function fmtD(d){if(!d)return'—';const[y,m,dd]=String(d).split('T')[0].split('-');return`${dd}/${m}/${y}`;}
function fmtLong(d){if(!d)return'';const[y,m,dd]=String(d).split('T')[0].split('-');const M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${parseInt(dd)} ${M[parseInt(m)-1]}, ${y}`;}
function ini(n){if(!n)return'??';return n.split(' ').slice(0,2).map(w=>w[0]).join('');}
function logoEl(mlbId,bg,tx,abbr,size=44){
  return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
    <img src="https://www.mlbstatic.com/team-logos/${mlbId}.svg" style="width:${size-8}px;height:${size-8}px;object-fit:contain"
      onerror="this.style.display='none';this.nextSibling.style.display='flex'">
    <span style="display:none;font-family:'Bebas Neue',sans-serif;font-size:${Math.round(size*.27)}px;color:${tx};align-items:center;justify-content:center;width:100%;height:100%">${abbr}</span>
  </div>`;
}

// ── PREDICTION ENGINE ─────────────────────────────────────
function calcPrediction(stats, vibToday, isPitcher) {
  let totalG=0, totalScore=0;
  const vals=[];
  for(let v=1;v<=9;v++){
    const s=stats[v];
    if(!s||s.G<3)continue;
    const score=isPitcher?(s.G>0?s.W/(s.W+s.L||1)*100:0):(s.G>0?s.H/s.G:0);
    vals.push(score);
    totalG+=s.G;
    totalScore+=score;
  }
  if(vals.length===0)return{level:'neutral',pct:0,label:'SIN DATOS'};
  const avg=totalScore/vals.length;
  const todaySt=stats[vibToday];
  if(!todaySt||todaySt.G<3)return{level:'neutral',pct:0,label:'POCOS DATOS'};
  const todayScore=isPitcher?(todaySt.G>0?todaySt.W/(todaySt.W+todaySt.L||1)*100:0):(todaySt.G>0?todaySt.H/todaySt.G:0);
  const diff=avg>0?Math.round(((todayScore-avg)/avg)*100):0;
  const maxScore=Math.max(...vals);
  const minScore=Math.min(...vals);
  const bestVib=Object.entries(stats).find(([v,s])=>{
    if(!s||s.G<3)return false;
    const sc=isPitcher?(s.G>0?s.W/(s.W+s.L||1)*100:0):(s.G>0?s.H/s.G:0);
    return Math.abs(sc-maxScore)<0.001;
  });
  const worstVib=Object.entries(stats).find(([v,s])=>{
    if(!s||s.G<3)return false;
    const sc=isPitcher?(s.G>0?s.W/(s.W+s.L||1)*100:0):(s.G>0?s.H/s.G:0);
    return Math.abs(sc-minScore)<0.001&&sc<maxScore;
  });
  let level='neutral',label='NEUTRAL';
  if(diff>=20){level='high';label='HIGH PERFORMANCE';}
  else if(diff<=-20){level='low';label='LOW PERFORMANCE';}
  return{level,label,pct:diff,bestVib:bestVib?parseInt(bestVib[0]):null,worstVib:worstVib?parseInt(worstVib[0]):null};
}

let curDate=today();

// ── TOPBAR / NAV ──────────────────────────────────────────
document.getElementById('back-btn').onclick=()=>{

// ── TOP PICKS ─────────────────────────────────────────────
async function loadTopPicks(){
  if(cachedPicks){renderPicks(cachedPicks,currentPicksSection);return;}
  document.getElementById('picks-content').innerHTML='<div class="picks-loading">Calculando picks del día…<br><small style="opacity:.5">Analizando 150 jugadores…</small></div>';
  if(!allTeams.length){setTimeout(loadTopPicks,1000);return;}

  const results=[];

  // Process teams in parallel batches of 5
  const batches=[];
  for(let i=0;i<allTeams.length;i+=5) batches.push(allTeams.slice(i,i+5));

  for(const batch of batches){
    await Promise.all(batch.map(async team=>{
      try{
        const pRes=await fetch(`${API}/players?teamId=${team.id}`);
        const players=await pRes.json();
        await Promise.all(players.map(async p=>{
          try{
            const vibToday=vib(p.birth_date,today());
            const isPitcher=['SP','RP','P'].includes(p.position||'');
            const aRes=await fetch(`${API}/analysis/player?playerId=${p.id}&season=2025`);
            const aData=await aRes.json();
            if(aData.error||!aData.stats)return;
            const pred=calcPrediction(aData.stats,vibToday,isPitcher);
            if(pred.label==='SIN DATOS'||pred.label==='POCOS DATOS')return;
            results.push({
              id:p.id, name:p.name, position:p.position,
              teamId:team.id, teamName:team.name, abbr:team.abbr,
              colors:team.colors, destinyNumber:p.destiny_number||dest(p.birth_date),
              vibToday, isPitcher, ...pred, player:p, team,
            });
          }catch(e){}
        }));
      }catch(e){}
    }));
  }

  cachedPicks=results;
  renderPicks(results,currentPicksSection);
}

function showPicksSection(section,el){
  currentPicksSection=section;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  if(cachedPicks)renderPicks(cachedPicks,section);
}

function renderPicks(results,section){
  const isOver=section==='over';
  const filtered=results
    .filter(p=>isOver?p.level==='high':p.level==='low')
    .sort((a,b)=>isOver?b.pct-a.pct:a.pct-b.pct)
    .slice(0,8);

  if(!filtered.length){
    document.getElementById('picks-content').innerHTML=`<div class="loading">No hay picks disponibles aún</div>`;
    return;
  }

  const html=`<div class="picks-section">
    <div class="picks-title">
      ${isOver?'🔥 TOP OVER — MAYOR RENDIMIENTO HOY':'🔻 TOP UNDER — MENOR RENDIMIENTO HOY'}
      <span class="badge ${isOver?'over-badge':'under-badge'}">${filtered.length} picks</span>
    </div>
    ${filtered.map(p=>{
      const c=p.colors||{bg:'#1A1D28',tx:'#C9A84C'};
      const pctStr=p.pct>=0?`+${p.pct}%`:`${p.pct}%`;
      const pctColor=isOver?'var(--win)':'var(--loss)';
      return`<div class="pick-card ${isOver?'hot':'cold'}" onclick='openTeamThenPlayer("${p.teamId}",${JSON.stringify(p.player)})'>
        <div class="pick-avatar" style="background:${VB[p.destinyNumber]};color:${VC[p.destinyNumber]}">${ini(p.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="pick-name">${p.name}</div>
          <div class="pick-team">${p.teamName} · ${p.position}</div>
          <div style="margin-top:4px;font-size:10px;color:var(--mu);font-family:'DM Mono',monospace">
            Vib. activa: <span style="color:${VC[p.vibToday]};font-family:'Bebas Neue',sans-serif;font-size:14px">${p.vibToday}</span>
          </div>
        </div>
        <div class="pick-right">
          <div class="pick-pct" style="color:${pctColor}">${pctStr}</div>
          <div class="pick-label" style="color:${pctColor}">${isOver?'HIGH PERF':'LOW PERF'}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
  document.getElementById('picks-content').innerHTML=html;
}

        </div>

async function loadTeamVibStats(teamId){
  try{
    const [r25,r26]=await Promise.all([
      fetch(`${API}/analysis/manager?teamId=${teamId}&season=2025`),
      fetch(`${API}/analysis/manager?teamId=${teamId}&season=2026`)
    ]);
    const d25=await r25.json();const d26=await r26.json();
    teamVibStats2025=d25.stats||{};teamVibStats2026=d26.stats||{};
    for(let v=1;v<=9;v++){if(!teamVibStats2026[v])teamVibStats2026[v]={G:0,W:0,L:0};}

    // Find best/worst vib from 2025
    let bestV=1,worstV=1,bestPct=0,worstPct=100;
    for(let v=1;v<=9;v++){
      const s=teamVibStats2025[v];if(!s||s.G<5)continue;
      const p=Math.round(s.W/s.G*100);
      if(p>bestPct){bestPct=p;bestV=v;}
      if(p<worstPct){worstPct=p;worstV=v;}
    }

    const todayV=vibDay(curDate);

    // Build team hero with best/worst
    const c=curTeam.colors||{bg:'#1A1D28',tx:'#C9A84C'};
    document.getElementById('team-hero').innerHTML=`
      <div class="team-hero">
        <div class="team-hero-top">
          ${logoEl(curTeam.mlb_id,c.bg,c.tx,curTeam.abbr,58)}

            <div class="team-hero-name">${curTeam.name}</div>
            <div class="team-hero-div">${curTeam.division||''} · MLB</div>
          </div>
        </div>
        <div class="best-worst-row">
          <div class="bw-chip" style="background:rgba(34,197,94,0.1);border:0.5px solid rgba(34,197,94,0.25)">
            <div class="bw-chip-label" style="color:var(--win)">MEJOR VIB.</div>
            <div class="bw-chip-num" style="color:${VC[bestV]}">${bestV}</div>
            <div class="bw-chip-sub" style="color:var(--win)">${bestPct}% WIN</div>
          </div>
          <div class="bw-chip" style="background:rgba(168,85,247,0.1);border:0.5px solid rgba(168,85,247,0.25)">
            <div class="bw-chip-label" style="color:var(--loss)">PEOR VIB.</div>

            <div class="bw-chip-sub" style="color:var(--loss)">${worstPct}% WIN</div>

  }
}

function renderVibCard(v){
  const st25=teamVibStats2025?teamVibStats2025[v]||{G:0,W:0,L:0}:{G:0,W:0,L:0};
  const st26=teamVibStats2026?teamVibStats2026[v]||{G:0,W:0,L:0}:{G:0,W:0,L:0};
  const pct25=st25.G>0?Math.round(st25.W/st25.G*100):0;
  const pct26=st26.G>0?Math.round(st26.W/st26.G*100):0;

  function seasonBlock(st,pct,year,isLive){
    const isGood=pct>=55;
    const pill=isLive?`<span class="live-pill">LIVE</span>`:'';
    return`<div class="${year===2025?'season-divider':''}">
      <div class="season-tag">TEMPORADA ${year}${pill}</div>
      ${st.G>0?`
        <div class="tvc-record">
          <span class="tvc-wl" style="color:var(--win)">${st.W}W</span>
          <span style="color:var(--mu);font-family:'DM Mono',monospace;font-size:14px"> — </span>
          <span class="tvc-wl" style="color:var(--loss)">${st.L}L</span>
          <span class="tvc-pct">· ${st.G} juegos</span>
        </div>
        <div class="win-bar-wrap">
          <div class="win-bar-fill" style="width:${pct}%;background:${isGood?'var(--win)':'var(--loss)'}"></div>
        </div>
        <div class="win-bar-label">
          <span style="color:var(--win)">WIN ${pct}%</span>
          <span style="color:var(--loss)">LOSS ${100-pct}%</span>
        </div>`
      :`<div style="color:var(--mu);font-size:11px;font-family:'DM Mono',monospace;padding:3px 0">No games yet · Sin juegos aún</div>`}
    </div>`;
  }

  document.getElementById('today-vib-card-wrap').innerHTML=`
    <div class="today-vib-card">
      <div class="tvc-top">
        <div class="tvc-num" style="color:${VC[v]}">${v}</div>
        <div>
          <div class="tvc-label">VIBRACIÓN DEL DÍA · ${fmtLong(curDate)}</div>
          <div class="tvc-meaning" style="color:${VC[v]}">${VM[v]}</div>
        </div>
      </div>
      ${seasonBlock(st25,pct25,2025,false)}
      ${seasonBlock(st26,pct26,2026,true)}
    </div>`;
}

function renderVibTabs(todayV){
  const tabs=document.getElementById('vib-tabs');
  tabs.innerHTML='';
  for(let v=1;v<=9;v++){
    const btn=document.createElement('div');
    btn.className='vib-tab'+(v===todayV?' active':'');
    btn.style.background=VB[v];btn.style.color=VC[v];
    btn.textContent=v;
    btn.onclick=()=>{
      document.querySelectorAll('.vib-tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      renderVibCard(v);
    };
    tabs.appendChild(btn);
  }
}

// ── REPORT ────────────────────────────────────────────────
function openReport(person,isManager,date){
  if(typeof person==='string')person=JSON.parse(person);
  curPerson=person;curIsManager=isManager;reportDate=date||curDate;curSeason=2026;
  const cv=vib(person.birth_date,reportDate);
  const dv=person.destiny_number||dest(person.birth_date);

  document.getElementById('report-hdr').innerHTML=`
    <div class="rh-person">
      <div class="rh-avatar" style="background:${VB[dv]};color:${VC[dv]}">${ini(person.name)}</div>
      <div>
        <div class="rh-name">${person.name}</div>
        <div class="rh-meta">${isManager?'Manager':person.position} · ${fmtD(person.birth_date)}</div>
        <div style="font-size:11px;color:var(--mu);margin-top:3px">Destino: <span style="color:${VC[dv]};font-family:'Bebas Neue',sans-serif;font-size:15px">${dv}</span> · ${VM[dv]}</div>
      </div>
    </div>
    <div class="vib-today-card">
      <div class="vtc-num" style="color:${VC[cv]}">${cv}</div>
      <div>
        <div class="vtc-label">VIBRACIÓN · ${fmtLong(reportDate)}</div>
        <div class="vtc-meaning">${VM[cv]}</div>
        <div class="vtc-formula">${String(person.birth_date).split('T')[0]} + ${reportDate}</div>
      </div>
    </div>`;

  document.querySelectorAll('.stab[data-s]').forEach(t=>{
    t.classList.toggle('on',t.dataset.s==='2026');
    t.onclick=()=>{
      document.querySelectorAll('.stab[data-s]').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');curSeason=parseInt(t.dataset.s);
      loadReport(person,isManager,curSeason,reportDate);
    };
  });
  loadReport(person,isManager,2026,reportDate);
  if(prevScreen!=='picks') prevScreen='team';
  show('report');
}

async function loadReport(person,isManager,season,date){
  const container=document.getElementById('report-content');
  container.innerHTML='<div class="loading">Cargando análisis</div>';
  const todayVib=vib(person.birth_date,date);
  try{
    let stats,headers,rows='';
    if(isManager){
      const r=await fetch(`${API}/analysis/manager?teamId=${curTeam.id}&season=${season}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      stats=d.stats;
      const vals=Object.values(stats).filter(s=>s.G>0);
      const maxW=Math.max(...vals.map(s=>s.W),1);
      const minW=vals.length?Math.min(...vals.map(s=>s.W)):0;
      headers=['VIB','G','W','L','W%','TEND.'];
      for(let v=1;v<=9;v++){
        const st=stats[v];
        const pct=st.G>0?Math.round(st.W/st.G*100):0;
        const trend=pct>=55?'OVER':pct<=45?'UNDER':'EVEN';
        const tc=pct>=55?'over':pct<=45?'under':'even';
        const isToday=v===todayVib;
        const isBest=st.W===maxW&&st.W>0;
        const isWorst=st.G>0&&st.W===minW&&minW<maxW;
        rows+=`<tr class="${isBest?'best':isWorst?'worst':''}${isToday?' today-row':''}">
          <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
          <td style="color:var(--mu)">${st.G}</td>
          <td style="color:var(--win)">${st.W}</td>
          <td style="color:var(--loss)">${st.L||0}</td>
          <td style="color:${pct>=50?'var(--win)':'var(--loss)'};font-family:'DM Mono',monospace">${st.G>0?pct+'%':'—'}</td>
          <td><span class="trend-chip ${tc}">${st.G>0?trend:'—'}</span></td>
        </tr>`;
      }
    } else {
      const isPitcher=['SP','RP','P'].includes(person.position||'');
      const r=await fetch(`${API}/analysis/player?playerId=${person.id}&season=${season}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      stats=d.stats;
      const pred=calcPrediction(stats,todayVib,isPitcher);

      // Prediction box in header
      const predHTML=`<div class="pred-box ${pred.level}">
        <div class="pred-icon">${pred.level==='high'?'🔥':pred.level==='low'?'🔻':'⚖️'}</div>
        <div>
          <div class="pred-text" style="color:${pred.level==='high'?'var(--win)':pred.level==='low'?'var(--loss)':'var(--mu)'}">${pred.label}</div>
          <div style="font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px">vs promedio histórico</div>
        </div>
        ${Math.abs(pred.pct)>0?`<div class="pred-pct" style="color:${pred.level==='high'?'var(--win)':'var(--loss)'}">${pred.pct>=0?'+':''}${pred.pct}%</div>`:''}
      </div>`;

      // Add pred box to header
      document.getElementById('report-hdr').innerHTML+=predHTML;

      if(isPitcher){
        const vals=Object.values(stats).filter(s=>s.G>0);
        const maxW=Math.max(...vals.map(s=>s.W),1);
        const minW=vals.length?Math.min(...vals.map(s=>s.W)):0;
        headers=['VIB','G','W','L','SO','TEND.'];
        for(let v=1;v<=9;v++){
          const st=stats[v];
          const trend=st.W===maxW&&st.W>0?'OVER':st.G>3&&st.W<(maxW*0.4)?'UNDER':'EVEN';
          const tc=trend==='OVER'?'over':trend==='UNDER'?'under':'even';
          const isToday=v===todayVib;
          rows+=`<tr class="${st.W===maxW&&st.W>0?'best':st.G>0&&st.W===minW&&minW<maxW?'worst':''}${isToday?' today-row':''}">
            <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
            <td style="color:var(--mu)">${st.G}</td>
            <td style="color:var(--win)">${st.W}</td>
            <td style="color:var(--loss)">${st.L}</td>
            <td>${st.SO}</td>
            <td><span class="trend-chip ${tc}">${st.G>0?trend:'—'}</span></td>
          </tr>`;
        }
      } else {
        const vals=Object.values(stats).filter(s=>s.G>0);
        const maxH=Math.max(...vals.map(s=>s.H),1);
        const minH=vals.length?Math.min(...vals.map(s=>s.H)):0;
        headers=['VIB','G','H','HR','RBI','K','TEND.'];
        for(let v=1;v<=9;v++){
          const st=stats[v];
          const trend=st.H===maxH&&st.H>0?'OVER':st.G>3&&st.H<(maxH*0.4)?'UNDER':'EVEN';
          const tc=trend==='OVER'?'over':trend==='UNDER'?'under':'even';
          const isToday=v===todayVib;
          rows+=`<tr class="${st.H===maxH&&st.H>0?'best':st.G>0&&st.H===minH&&minH<maxH?'worst':''}${isToday?' today-row':''}">
            <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
            <td style="color:var(--mu)">${st.G}</td>
            <td style="color:var(--win)">${st.H}</td>
            <td>${st.HR}</td>
            <td>${st.RBI}</td>
            <td style="color:var(--mu)">${st.K}</td>
            <td><span class="trend-chip ${tc}">${st.G>0?trend:'—'}</span></td>
          </tr>`;
        }
      }
    }
    container.innerHTML=`
      <div class="stats-wrap">
        <div class="stats-info">TEMP. ${season}${season===2026?'<span class="live-pill">LIVE</span>':''} · 🟢 Mejor · 🟣 Peor · HOY = vibración actual</div>
        <table class="stats-table">
          <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(e){
    container.innerHTML=`<div class="err">Error: ${e.message}</div>`;
  }
}

// ── DATE MODAL ────────────────────────────────────────────
function openDateModal(person,isManager){
  if(typeof person==='string')person=JSON.parse(person);
  curPerson=person;curIsManager=isManager;
  document.getElementById('modal-date-inp').value=curDate;
  document.getElementById('date-modal').classList.add('show');
}
function closeModal(){document.getElementById('date-modal').classList.remove('show');}
function modalToday(){document.getElementById('modal-date-inp').value=today();}
function confirmModal(){const d=document.getElementById('modal-date-inp').value;closeModal();if(d)openReport(curPerson,curIsManager,d);}
document.getElementById('date-modal').onclick=e=>{if(e.target.id==='date-modal')closeModal();};

// ── VS ────────────────────────────────────────────────────
function openVS(person,isManager){
  if(typeof person==='string')person=JSON.parse(person);
  curPerson=person;curIsManager=isManager;
  const sel=document.getElementById('vs-select');
  sel.innerHTML='<option value="">— Selecciona oponente —</option>';
  allTeams.filter(t=>t.id!==curTeam.id).sort((a,b)=>a.name.localeCompare(b.name)).forEach(t=>{
    const o=document.createElement('option');o.value=t.id;o.textContent=t.name;sel.appendChild(o);
  });
  document.getElementById('vs-content').innerHTML='<div class="loading" style="padding:20px">Selecciona un equipo oponente</div>';
  show('vs');
}

function setVSSeason(s){
  curVSSeason=s;
  document.getElementById('vs-tab-2025').classList.toggle('on',s===2025);
  document.getElementById('vs-tab-2026').classList.toggle('on',s===2026);
  const oppId=document.getElementById('vs-select').value;
  if(oppId)loadVS();
}

async function loadVS(){
  const oppId=document.getElementById('vs-select').value;
  if(!oppId)return;
  const opp=allTeams.find(t=>t.id===oppId);
  const container=document.getElementById('vs-content');
  container.innerHTML='<div class="loading">Cargando historial</div>';
  try{
    const r=await fetch(`${API}/analysis/vs?teamA=${curTeam.id}&teamB=${oppId}&season=${curVSSeason}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    const ca=curTeam.colors||{bg:'#1A1D28',tx:'#C9A84C'};
    const cb=opp.colors||{bg:'#1A1D28',tx:'#C9A84C'};
    const totalW=Object.values(d.statsA).reduce((s,x)=>s+(x.W||0),0);
    const totalL=Object.values(d.statsA).reduce((s,x)=>s+(x.L||0),0);
    const todayVib=vib(curPerson.birth_date,curDate);
    const maxW=Math.max(...Object.values(d.statsA).map(s=>s.W||0),1);

    // Calculate advantage
    const wpct=totalW+totalL>0?totalW/(totalW+totalL)*100:50;
    let advClass='neutral',advIcon='⚖️',advText='NEUTRAL',advSub='Historial equilibrado';
    if(wpct>=60){advClass='a';advIcon='🟢';advText=`VENTAJA ${curTeam.abbr}`;advSub=`${Math.round(wpct)}% win rate histórico`;}
    else if(wpct<=40){advClass='b';advIcon='🟣';advText=`VENTAJA ${opp.abbr}`;advSub=`${Math.round(100-wpct)}% win rate rival`;}

    let rows='';
    for(let v=1;v<=9;v++){
      const st=d.statsA[v];if(!st||st.G===0)continue;
      const pct=Math.round(st.W/st.G*100);
      const isToday=v===todayVib;
      rows+=`<tr class="${st.W===maxW&&st.W>0?'best':''}${isToday?' today-row':''}">
        <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
        <td style="color:var(--mu)">${st.G}</td>
        <td style="color:var(--win)">${st.W}</td>
        <td style="color:var(--loss)">${st.L||0}</td>
        <td style="color:${pct>=50?'var(--win)':'var(--loss)'};font-family:'DM Mono',monospace">${pct}%</td>
      </tr>`;
    }
    container.innerHTML=`
      <div class="vs-advantage ${advClass}">
        <div class="vs-adv-icon">${advIcon}</div>
        <div><div class="vs-adv-text">${advText}</div><div class="vs-adv-sub">${advSub}</div></div>
      </div>
      <div class="vs-matchup">
        <div class="vs-team">
          <div class="vs-team-logo">${logoEl(curTeam.mlb_id,ca.bg,ca.tx,curTeam.abbr,48)}</div>
          <div class="vs-team-label">${curTeam.abbr}</div>
          <div class="vs-record" style="color:var(--win)">${totalW}W</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="vs-team">
          <div class="vs-team-logo">${logoEl(opp.mlb_id,cb.bg,cb.tx,opp.abbr,48)}</div>
          <div class="vs-team-label">${opp.abbr}</div>
          <div class="vs-record" style="color:var(--loss)">${totalL}L</div>
        </div>
      </div>
      <div class="vs-sub">${curPerson.name} · ${curTeam.name} vs ${opp.name} · ${curVSSeason} · ${d.totalGames} juegos</div>
      <div class="stats-wrap">
        ${rows?`<table class="stats-table">
          <thead><tr><th>VIB</th><th>G</th><th>W</th><th>L</th><th>W%</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`:`<div class="err">Sin enfrentamientos en ${curVSSeason}</div>`}
      </div>`;
  }catch(e){
    container.innerHTML=`<div class="err">Error: ${e.message}</div>`;
  }
}

function showTeams(){
  show('teams','home');
  renderTeams();
}

init();
</script>
