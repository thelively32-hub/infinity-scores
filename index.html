<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Infinity Scores</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--ink:#0A0C14;
  --s1:#12151E;--s2:#181C28;--s3:#1E2230;
  --br:rgba(201,168,76,0.2);--br2:rgba(255,255,255,0.07);
  --tx:#E8E2D4;--mu:#5A6170;--ac:#4FC3A1;
  --win:#4FC3A1;--loss:#E05C5C;--r:12px;
}
html,body{min-height:100vh;background:var(--ink);color:var(--tx);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto}
.screen{display:none}.screen.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--br2);min-height:52px;position:sticky;top:0;background:var(--ink);z-index:10;gap:10px}
.back-btn{display:none;width:34px;height:34px;border-radius:50%;background:var(--s2);border:0.5px solid var(--br2);align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--gold);flex-shrink:0}
.back-btn.show{display:flex}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold-l)}
.topbar-logo span{color:var(--ac)}
.topbar-right{margin-left:auto;text-align:right}
.topbar-vib{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.topbar-date{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}

/* TEAMS */
.teams-header{padding:10px 14px;background:var(--s2);border-bottom:0.5px solid var(--br2);display:flex;align-items:center;gap:10px}
.league-badge{background:rgba(232,24,40,0.15);border:0.5px solid rgba(232,24,40,0.3);color:#E81828;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:4px 10px;border-radius:20px}
.teams-vib-info{flex:1}
.tvi-label{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px}
.tvi-meaning{font-size:11px;color:var(--tx);margin-top:1px}
.search-wrap{padding:10px 14px;border-bottom:0.5px solid var(--br2)}
.search-inp{width:100%;background:var(--s2);border:0.5px solid var(--br2);color:var(--tx);padding:9px 14px;border-radius:8px;font-size:14px}
.search-inp::placeholder{color:var(--mu)}
.teams-list{padding:8px 12px;display:flex;flex-direction:column;gap:7px}
.team-row{background:var(--s2);border:0.5px solid var(--br2);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.team-row:hover,.team-row:active{border-color:var(--br)}
.team-logo-wrap{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.team-logo-wrap img{width:36px;height:36px;object-fit:contain}
.team-logo-fallback{font-family:'Bebas Neue',sans-serif;font-size:12px;font-weight:700}
.team-info{flex:1;min-width:0}
.team-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-div{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.vib-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;flex-shrink:0}

/* TEAM DETAIL */
.team-hero{padding:16px;border-bottom:0.5px solid var(--br2)}
.team-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.hero-logo-wrap{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.hero-logo-wrap img{width:48px;height:48px;object-fit:contain}
.hero-logo-fallback{font-family:'Bebas Neue',sans-serif;font-size:16px}
.team-hero-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold-l)}
.team-hero-div{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.day-vib-strip{background:var(--s2);border:0.5px solid var(--br);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.dvs-num{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1}
.dvs-right{flex:1}
.dvs-label{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px}
.dvs-meaning{font-size:12px;color:var(--tx);margin-top:3px;line-height:1.4}

/* SECTION */
.sec-label{font-size:10px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:2px;padding:14px 16px 8px}

/* PERSON CARD */
.person-card{margin:0 12px 8px;background:var(--s2);border:0.5px solid var(--br2);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.person-card:hover{border-color:var(--br)}
.pc-top{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.pc-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;flex-shrink:0}
.pc-name{font-size:15px;font-weight:500}
.pc-meta{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px}
.pc-vib-today{margin-top:5px;font-size:11px;color:var(--mu)}
.pc-right{margin-left:auto;text-align:center;flex-shrink:0}
.dest-chip{background:var(--s1);border:0.5px solid var(--br);border-radius:8px;padding:6px 10px}
.dest-chip-label{font-size:8px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px}
.dest-chip-num{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1.1}
.pc-footer{padding:10px 14px;border-top:0.5px solid var(--br2);display:flex;gap:8px}
.act-btn{flex:1;padding:8px 4px;border-radius:8px;border:0.5px solid var(--br);background:transparent;color:var(--gold);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;text-align:center;transition:all .15s}
.act-btn:hover{background:rgba(201,168,76,0.1)}
.act-btn.primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.act-btn.primary:hover{background:var(--gold-l)}

/* PLAYER ROW */
.player-row{margin:0 12px 7px;background:var(--s2);border:0.5px solid var(--br2);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.player-row:hover{border-color:var(--br)}
.pl-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;flex-shrink:0}
.pl-name{font-size:13px;font-weight:500}
.pl-meta{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}

/* REPORT */
.report-hdr{padding:16px;border-bottom:0.5px solid var(--br2)}
.rh-person{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rh-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0}
.rh-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold-l)}
.rh-meta{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.rh-dest{font-size:11px;color:var(--mu);margin-top:3px}
.vib-today-card{background:var(--s2);border:0.5px solid var(--br);border-radius:10px;padding:14px;display:flex;align-items:center;gap:16px}
.vtc-num{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1}
.vtc-label{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px}
.vtc-meaning{font-size:13px;color:var(--tx);margin-top:4px;line-height:1.5}
.vtc-formula{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:5px}
.season-tabs{display:flex;gap:8px;padding:12px 16px 0}
.stab{flex:1;padding:8px;border-radius:8px;border:0.5px solid var(--br2);text-align:center;cursor:pointer;font-size:12px;color:var(--mu);font-family:'DM Mono',monospace;transition:all .15s}
.stab.on{border-color:var(--gold);background:rgba(201,168,76,0.1);color:var(--gold)}
.stats-wrap{padding:12px}
.stats-info{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-bottom:8px;line-height:1.5}
.stats-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--s2);border-radius:10px;overflow:hidden;border:0.5px solid var(--br2)}
.stats-table th{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:1px;padding:8px 5px;text-align:center;border-bottom:0.5px solid var(--br2)}
.stats-table td{padding:8px 5px;text-align:center;border-bottom:0.5px solid rgba(255,255,255,0.03)}
.stats-table tr.best td{background:rgba(201,168,76,0.07)}
.stats-table tr.today-row{outline:1px solid rgba(201,168,76,0.5)}
.stats-table tr:last-child td{border-bottom:none}
.vib-n{font-family:'Bebas Neue',sans-serif;font-size:18px}
.today-tag{font-size:8px;color:var(--gold);font-family:'DM Mono',monospace;display:block;line-height:1.2}
.trend-chip{display:inline-block;font-size:9px;padding:2px 6px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:1px}
.over{background:rgba(79,195,161,0.15);color:var(--win)}
.under{background:rgba(224,92,92,0.15);color:var(--loss)}
.even{background:rgba(90,97,112,0.2);color:var(--mu)}

/* VS */
.vs-controls{padding:12px 16px;border-bottom:0.5px solid var(--br2);display:flex;gap:8px;align-items:center}
.vs-select{flex:1;background:var(--s2);border:0.5px solid var(--br2);color:var(--tx);padding:9px 12px;border-radius:8px;font-size:13px}
.vs-go{background:var(--gold);color:#000;border:none;padding:9px 16px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer}
.vs-matchup{display:flex;align-items:center;padding:16px;border-bottom:0.5px solid var(--br2)}
.vs-team{flex:1;text-align:center}
.vs-team-logo{width:48px;height:48px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.vs-team-logo img{width:38px;height:38px;object-fit:contain}
.vs-abbr-txt{font-family:'Bebas Neue',sans-serif;font-size:13px}
.vs-team-label{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.vs-record{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-top:2px}
.vs-divider{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--mu);padding:0 8px}
.vs-sub{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;padding:8px 16px 4px}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.modal-box{background:var(--s1);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px;border-top:0.5px solid var(--br)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold-l);margin-bottom:14px;letter-spacing:1px}
.modal-date{width:100%;background:var(--s2);border:0.5px solid var(--br);color:var(--tx);padding:10px 14px;border-radius:8px;font-family:'DM Mono',monospace;font-size:14px;margin-bottom:14px}
.modal-btns{display:flex;gap:8px}
.mbtn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer}
.mbtn.cancel{background:var(--s2);color:var(--mu)}
.mbtn.today-btn{background:var(--s3);color:var(--gold);border:0.5px solid var(--br)}
.mbtn.confirm{background:var(--gold);color:#000}

/* UTILS */
.loading{text-align:center;padding:24px;color:var(--mu);font-size:12px;font-family:'DM Mono',monospace}
.err{margin:12px;padding:10px 12px;background:rgba(224,92,92,0.1);border:0.5px solid rgba(224,92,92,0.3);border-radius:8px;font-size:11px;color:var(--loss);font-family:'DM Mono',monospace}
.live-pill{display:inline-block;background:rgba(79,195,161,0.12);color:var(--ac);font-size:9px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;border:0.5px solid var(--ac);margin-left:6px}
input:focus,select:focus{outline:none;border-color:var(--gold)!important}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="back-btn" id="back-btn">←</div>
  <div class="topbar-logo">INFINITY <span>SCORES</span></div>
  <div class="topbar-right">
    <div class="topbar-vib" id="topbar-vib-num"></div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>
</div>

<!-- S0: TEAMS (pantalla principal) -->
<div class="screen active" id="s-teams">
  <div class="teams-header">
    <div class="league-badge">MLB</div>
    <div class="teams-vib-info">
      <div class="tvi-label">VIBRACIÓN UNIVERSAL HOY</div>
      <div class="tvi-meaning" id="teams-vib-meaning"></div>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-inp" type="text" id="search-inp" placeholder="🔍 Buscar equipo...">
  </div>
  <div class="teams-list" id="teams-list"><div class="loading">Cargando equipos</div></div>
</div>

<!-- S1: TEAM DETAIL -->
<div class="screen" id="s-team">
  <div id="team-hero"></div>
  <div class="sec-label">MANAGER</div>
  <div id="mgr-card"></div>
  <div class="sec-label">JUGADORES</div>
  <div id="players-list"></div>
  <div style="height:30px"></div>
</div>

<!-- S2: REPORT -->
<div class="screen" id="s-report">
  <div class="report-hdr" id="report-hdr"></div>
  <div class="season-tabs">
    <div class="stab on" data-s="2025">TEMPORADA 2025</div>
    <div class="stab" data-s="2026">2026 ★ LIVE</div>
  </div>
  <div id="report-content"><div class="loading">Cargando stats</div></div>
  <div style="height:30px"></div>
</div>

<!-- S3: VS -->
<div class="screen" id="s-vs">
  <div class="vs-controls">
    <select class="vs-select" id="vs-select"><option value="">— Selecciona oponente —</option></select>
    <button class="vs-go" onclick="loadVS()">VER</button>
  </div>
  <div id="vs-content"><div class="loading" style="padding:20px">Selecciona un equipo oponente</div></div>
  <div style="height:30px"></div>
</div>

<!-- DATE MODAL -->
<div class="modal" id="date-modal">
  <div class="modal-box">
    <div class="modal-title">SELECCIONAR FECHA</div>
    <input type="date" class="modal-date" id="modal-date-inp">
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">CANCELAR</button>
      <button class="mbtn today-btn" onclick="modalToday()">HOY</button>
      <button class="mbtn confirm" onclick="confirmModal()">VER REPORTE</button>
    </div>
  </div>
</div>

<script>
const API='https://infinity-sport-backend-production.up.railway.app/api';
const VC={1:'#E05C5C',2:'#E8874A',3:'#D4A017',4:'#4FC3A1',5:'#5B8FE8',6:'#C084FC',7:'#34D399',8:'#F87171',9:'#FBBF24'};
const VB={1:'rgba(224,92,92,.18)',2:'rgba(232,135,74,.18)',3:'rgba(212,160,23,.18)',4:'rgba(79,195,161,.18)',5:'rgba(91,143,232,.18)',6:'rgba(192,132,252,.18)',7:'rgba(52,211,153,.18)',8:'rgba(248,113,113,.18)',9:'rgba(251,191,36,.18)'};
const VM={1:'Liderazgo · Inicio · Independencia',2:'Cooperación · Intuición · Balance',3:'Creatividad · Expresión · Energía',4:'Estabilidad · Trabajo · Disciplina',5:'Libertad · Cambio · Riesgo',6:'Armonía · Responsabilidad · Protección',7:'Análisis · Introspección · Precisión',8:'Poder · Ambición · Resultados',9:'Sabiduría · Humanidad · Cierre'};

function red(n){while(n>9){n=String(n).split('').reduce((a,d)=>a+parseInt(d),0);}return n;}
function vib(b,t){if(!b||!t)return 1;const bd=String(b).split('T')[0];const td=String(t).split('T')[0];const[by,bm,bdd]=bd.split('-').map(Number);const[ty,tm,tdd]=td.split('-').map(Number);if(!by||!ty)return 1;return red(by+bm+bdd+ty+tm+tdd);}
function dest(b){if(!b)return 1;const[y,m,d]=String(b).split('T')[0].split('-').map(Number);return red(y+m+d);}
function today(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function fmtD(d){if(!d)return'—';const[y,m,dd]=String(d).split('T')[0].split('-');return`${dd}/${m}/${y}`;}
function fmtLong(d){if(!d)return'';const[y,m,dd]=String(d).split('T')[0].split('-');const M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${parseInt(dd)} ${M[parseInt(m)-1]}, ${y}`;}
function ini(n){if(!n)return'??';return n.split(' ').slice(0,2).map(w=>w[0]).join('');}
function univVib(d){const[y,m,dd]=d.split('-').map(Number);return red(y+m+dd);}
function logoEl(mlbId,bg,tx,abbr,size=44){
  return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
    <img src="https://www.mlbstatic.com/team-logos/${mlbId}.svg"
      style="width:${size-8}px;height:${size-8}px;object-fit:contain"
      onerror="this.style.display='none';this.nextSibling.style.display='flex'"
    ><span style="display:none;font-family:'Bebas Neue',sans-serif;font-size:${Math.round(size*0.28)}px;color:${tx};align-items:center;justify-content:center;width:100%;height:100%">${abbr}</span>
  </div>`;
}

// STATE
let curDate=today();
let allTeams=[];
let curTeam=null;
let curPerson=null;
let curIsManager=false;
let curSeason=2025;
let reportDate=today();

// TOPBAR
document.getElementById('back-btn').onclick=()=>{
  const cur=document.querySelector('.screen.active').id;
  if(cur==='s-team')show('teams');
  else if(cur==='s-report'||cur==='s-vs')show('team');
};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  const bb=document.getElementById('back-btn');
  id==='teams'?bb.classList.remove('show'):bb.classList.add('show');
  window.scrollTo(0,0);
}

// INIT
async function init(){
  const t=today();
  const uv=univVib(t);
  document.getElementById('topbar-vib-num').textContent=uv;
  document.getElementById('topbar-vib-num').style.color=VC[uv];
  document.getElementById('topbar-date').textContent=fmtLong(t);
  document.getElementById('teams-vib-meaning').textContent=`${uv} · ${VM[uv]}`;
  document.getElementById('teams-vib-meaning').style.color=VC[uv];
  await loadTeams();
}

// LOAD TEAMS
async function loadTeams(){
  try{
    const res=await fetch(`${API}/teams`);
    allTeams=await res.json();
    if(!Array.isArray(allTeams))throw new Error('Invalid response');
    renderTeams();
  }catch(e){
    document.getElementById('teams-list').innerHTML=`<div class="err">Error: ${e.message}</div>`;
  }
}

function renderTeams(search=''){
  const filtered=allTeams
    .filter(t=>t.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>a.name.localeCompare(b.name));

  document.getElementById('teams-list').innerHTML=
    filtered.map(t=>{
      const c=t.colors||{bg:'#1A1D28',tx:'#C9A84C'};
      const mv=t.manager_birth?vib(t.manager_birth,curDate):1;
      return`<div class="team-row" onclick="openTeam('${t.id}')">
        ${logoEl(t.mlb_id,c.bg,c.tx,t.abbr,44)}
        <div class="team-info">
          <div class="team-name">${t.name}</div>
          <div class="team-div">${t.division||''}</div>
        </div>
        <div class="vib-badge" style="background:${VB[mv]};color:${VC[mv]}">${mv}</div>
      </div>`;
    }).join('')+'<div style="height:10px"></div>';
}

document.getElementById('search-inp').oninput=e=>renderTeams(e.target.value);

// TEAM DETAIL
async function openTeam(id){
  curTeam=allTeams.find(t=>t.id===id);
  if(!curTeam)return;
  const c=curTeam.colors||{bg:'#1A1D28',tx:'#C9A84C'};
  const uv=univVib(curDate);

  document.getElementById('team-hero').innerHTML=`
    <div class="team-hero">
      <div class="team-hero-top">
        ${logoEl(curTeam.mlb_id,c.bg,c.tx,curTeam.abbr,58)}
        <div>
          <div class="team-hero-name">${curTeam.name}</div>
          <div class="team-hero-div">${curTeam.division||''} · MLB 2026</div>
        </div>
      </div>
      <div class="day-vib-strip">
        <div class="dvs-num" style="color:${VC[uv]}">${uv}</div>
        <div class="dvs-right">
          <div class="dvs-label">VIBRACIÓN UNIVERSAL HOY</div>
          <div class="dvs-meaning">${VM[uv]}</div>
        </div>
      </div>
    </div>`;

  // Manager
  const mgr={
    name:curTeam.manager_name,
    birth_date:curTeam.manager_birth,
    destiny_number:curTeam.manager_destiny||dest(curTeam.manager_birth),
    position:'MGR'
  };
  const mgrDest=mgr.destiny_number;
  const mgrVib=vib(mgr.birth_date,curDate);
  const mgrJson=JSON.stringify(mgr).replace(/'/g,"\\'").replace(/"/g,'&quot;');

  document.getElementById('mgr-card').innerHTML=`
    <div class="person-card">
      <div class="pc-top" onclick='openReport(${JSON.stringify(mgr)},true,"${curDate}")'>
        <div class="pc-avatar" style="background:${VB[mgrDest]};color:${VC[mgrDest]}">${ini(mgr.name)}</div>
        <div style="flex:1">
          <div class="pc-name">${mgr.name||'—'}</div>
          <div class="pc-meta">Manager · ${fmtD(mgr.birth_date)}</div>
          <div class="pc-vib-today">Vibración hoy: <span style="color:${VC[mgrVib]};font-family:'Bebas Neue',sans-serif;font-size:16px">${mgrVib}</span></div>
        </div>
        <div class="pc-right">
          <div class="dest-chip">
            <div class="dest-chip-label">DESTINO</div>
            <div class="dest-chip-num" style="color:${VC[mgrDest]}">${mgrDest}</div>
          </div>
        </div>
      </div>
      <div class="pc-footer">
        <button class="act-btn primary" onclick='openReport(${JSON.stringify(mgr)},true,"${curDate}")'>HOY</button>
        <button class="act-btn" onclick='openDateModal(${JSON.stringify(mgr)},true)'>📅 FECHA</button>
        <button class="act-btn" onclick='openVS(${JSON.stringify(mgr)},true)'>VS</button>
      </div>
    </div>`;

  // Players
  document.getElementById('players-list').innerHTML='<div class="loading">Cargando</div>';
  try{
    const res=await fetch(`${API}/players?teamId=${id}&season=2026`);
    const players=await res.json();
    document.getElementById('players-list').innerHTML=
      players.map(p=>{
        const pv=vib(p.birth_date,curDate);
        const pd=p.destiny_number||dest(p.birth_date);
        const pj=JSON.stringify(p);
        return`<div class="player-row" onclick='openReport(${pj},false,"${curDate}")'>
          <div class="pl-avatar" style="background:${VB[pd]};color:${VC[pd]}">${ini(p.name)}</div>
          <div style="flex:1">
            <div class="pl-name">${p.name}</div>
            <div class="pl-meta">${p.position} · Destino <span style="color:${VC[pd]};font-family:'Bebas Neue',sans-serif;font-size:14px">${pd}</span></div>
          </div>
          <div class="vib-badge" style="background:${VB[pv]};color:${VC[pv]}">${pv}</div>
        </div>`;
      }).join('')+'<div style="height:10px"></div>';
  }catch(e){
    document.getElementById('players-list').innerHTML=`<div class="err">${e.message}</div>`;
  }

  show('team');
}

// REPORT
function openReport(person,isManager,date){
  if(typeof person==='string')person=JSON.parse(person);
  curPerson=person;curIsManager=isManager;reportDate=date||curDate;curSeason=2025;

  const cv=vib(person.birth_date,reportDate);
  const dv=person.destiny_number||dest(person.birth_date);

  document.getElementById('report-hdr').innerHTML=`
    <div class="rh-person">
      <div class="rh-avatar" style="background:${VB[dv]};color:${VC[dv]}">${ini(person.name)}</div>
      <div>
        <div class="rh-name">${person.name}</div>
        <div class="rh-meta">${isManager?'Manager':person.position} · ${fmtD(person.birth_date)}</div>
        <div class="rh-dest">Destino: <span style="color:${VC[dv]};font-family:'Bebas Neue',sans-serif;font-size:15px">${dv}</span> · ${VM[dv].split(' · ')[0]}</div>
      </div>
    </div>
    <div class="vib-today-card">
      <div class="vtc-num" style="color:${VC[cv]}">${cv}</div>
      <div>
        <div class="vtc-label">VIBRACIÓN · ${fmtLong(reportDate)}</div>
        <div class="vtc-meaning">${VM[cv]}</div>
        <div class="vtc-formula">${String(person.birth_date).split('T')[0]} + ${reportDate}</div>
      </div>
    </div>`;

  document.querySelectorAll('.stab[data-s]').forEach(t=>{
    t.classList.toggle('on',t.dataset.s==='2025');
    t.onclick=()=>{
      document.querySelectorAll('.stab[data-s]').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');curSeason=parseInt(t.dataset.s);
      loadReport(person,isManager,curSeason,reportDate);
    };
  });

  loadReport(person,isManager,2025,reportDate);
  show('report');
}

async function loadReport(person,isManager,season,date){
  const container=document.getElementById('report-content');
  container.innerHTML='<div class="loading">Cargando análisis</div>';
  const todayVib=vib(person.birth_date,date);
  try{
    let stats,headers,rows='';
    if(isManager){
      const r=await fetch(`${API}/analysis/manager?teamId=${curTeam.id}&season=${season}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      stats=d.stats;
      const maxW=Math.max(...Object.values(stats).map(s=>s.W||0),1);
      headers=['VIB','G','W','L','W%','TEND.'];
      for(let v=1;v<=9;v++){
        const st=stats[v];
        const pct=st.G>0?Math.round(st.W/st.G*100):0;
        const trend=pct>=55?'OVER':pct<=45?'UNDER':'EVEN';
        const tc=pct>=55?'over':pct<=45?'under':'even';
        const isToday=v===todayVib;const isBest=st.W===maxW&&st.W>0;
        rows+=`<tr class="${isBest?'best':''}${isToday?' today-row':''}">
          <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
          <td style="color:var(--mu)">${st.G}</td>
          <td style="color:var(--win)">${st.W}</td>
          <td style="color:var(--loss)">${st.L||0}</td>
          <td style="color:${pct>=50?'var(--win)':'var(--loss)'};font-family:'DM Mono',monospace">${st.G>0?pct+'%':'—'}</td>
          <td><span class="trend-chip ${tc}">${st.G>0?trend:'—'}</span></td>
        </tr>`;
      }
    } else {
      const isPitcher=['SP','RP','P'].includes(person.position||'');
      const r=await fetch(`${API}/analysis/player?playerId=${person.id}&season=${season}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      stats=d.stats;
      if(isPitcher){
        headers=['VIB','G','W','L','SO','TEND.'];
        const maxW=Math.max(...Object.values(stats).map(s=>s.W||0),1);
        for(let v=1;v<=9;v++){
          const st=stats[v];
          const trend=st.W===maxW&&st.W>0?'OVER':st.G>3&&st.W<(maxW*0.4)?'UNDER':'EVEN';
          const tc=trend==='OVER'?'over':trend==='UNDER'?'under':'even';
          const isToday=v===todayVib;
          rows+=`<tr class="${st.W===maxW&&st.W>0?'best':''}${isToday?' today-row':''}">
            <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
            <td style="color:var(--mu)">${st.G}</td>
            <td style="color:var(--win)">${st.W}</td>
            <td style="color:var(--loss)">${st.L}</td>
            <td>${st.SO}</td>
            <td><span class="trend-chip ${tc}">${st.G>0?trend:'—'}</span></td>
          </tr>`;
        }
      } else {
        headers=['VIB','G','H','HR','RBI','K','TEND.'];
        const maxH=Math.max(...Object.values(stats).map(s=>s.H||0),1);
        for(let v=1;v<=9;v++){
          const st=stats[v];
          const trend=st.H===maxH&&st.H>0?'OVER':st.G>3&&st.H<(maxH*0.4)?'UNDER':'EVEN';
          const tc=trend==='OVER'?'over':trend==='UNDER'?'under':'even';
          const isToday=v===todayVib;
          rows+=`<tr class="${st.H===maxH&&st.H>0?'best':''}${isToday?' today-row':''}">
            <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
            <td style="color:var(--mu)">${st.G}</td>
            <td style="color:var(--win)">${st.H}</td>
            <td>${st.HR}</td>
            <td>${st.RBI}</td>
            <td style="color:var(--mu)">${st.K}</td>
            <td><span class="trend-chip ${tc}">${st.G>0?trend:'—'}</span></td>
          </tr>`;
        }
      }
    }
    container.innerHTML=`
      <div class="stats-wrap">
        <div class="stats-info">TEMP. ${season}${season===2026?'<span class="live-pill">LIVE</span>':''} · Dorado = mejor históricamente · HOY = vibración actual</div>
        <table class="stats-table">
          <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(e){
    container.innerHTML=`<div class="err">Error: ${e.message}</div>`;
  }
}

// DATE MODAL
function openDateModal(person,isManager){
  if(typeof person==='string')person=JSON.parse(person);
  curPerson=person;curIsManager=isManager;
  document.getElementById('modal-date-inp').value=curDate;
  document.getElementById('date-modal').classList.add('show');
}
function closeModal(){document.getElementById('date-modal').classList.remove('show');}
function modalToday(){document.getElementById('modal-date-inp').value=today();}
function confirmModal(){
  const d=document.getElementById('modal-date-inp').value;
  closeModal();if(d)openReport(curPerson,curIsManager,d);
}
document.getElementById('date-modal').onclick=e=>{if(e.target.id==='date-modal')closeModal();};

// VS
function openVS(person,isManager){
  if(typeof person==='string')person=JSON.parse(person);
  curPerson=person;curIsManager=isManager;
  const sel=document.getElementById('vs-select');
  sel.innerHTML='<option value="">— Selecciona oponente —</option>';
  allTeams.filter(t=>t.id!==curTeam.id).sort((a,b)=>a.name.localeCompare(b.name)).forEach(t=>{
    const o=document.createElement('option');o.value=t.id;o.textContent=t.name;sel.appendChild(o);
  });
  document.getElementById('vs-content').innerHTML='<div class="loading" style="padding:20px">Selecciona un equipo oponente</div>';
  show('vs');
}

async function loadVS(){
  const oppId=document.getElementById('vs-select').value;
  if(!oppId)return;
  const opp=allTeams.find(t=>t.id===oppId);
  const container=document.getElementById('vs-content');
  container.innerHTML='<div class="loading">Cargando historial</div>';
  try{
    const r=await fetch(`${API}/analysis/vs?teamA=${curTeam.id}&teamB=${oppId}&season=${curSeason}`);
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    const ca=curTeam.colors||{bg:'#1A1D28',tx:'#C9A84C'};
    const cb=opp.colors||{bg:'#1A1D28',tx:'#C9A84C'};
    const totalW=Object.values(d.statsA).reduce((s,x)=>s+(x.W||0),0);
    const totalL=Object.values(d.statsA).reduce((s,x)=>s+(x.L||0),0);
    const todayVib=vib(curPerson.birth_date,curDate);
    const maxW=Math.max(...Object.values(d.statsA).map(s=>s.W||0),1);
    let rows='';
    for(let v=1;v<=9;v++){
      const st=d.statsA[v];if(!st||st.G===0)continue;
      const pct=Math.round(st.W/st.G*100);
      const isToday=v===todayVib;
      rows+=`<tr class="${st.W===maxW&&st.W>0?'best':''}${isToday?' today-row':''}">
        <td class="vib-n" style="color:${VC[v]}">${v}${isToday?'<span class="today-tag">HOY</span>':''}</td>
        <td style="color:var(--mu)">${st.G}</td>
        <td style="color:var(--win)">${st.W}</td>
        <td style="color:var(--loss)">${st.L||0}</td>
        <td style="color:${pct>=50?'var(--win)':'var(--loss)'};font-family:'DM Mono',monospace">${pct}%</td>
      </tr>`;
    }
    container.innerHTML=`
      <div class="vs-matchup">
        <div class="vs-team">
          ${logoEl(curTeam.mlb_id,ca.bg,ca.tx,curTeam.abbr,48)}
          <div class="vs-team-label">${curTeam.abbr}</div>
          <div class="vs-record" style="color:var(--win)">${totalW}W</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="vs-team">
          ${logoEl(opp.mlb_id,cb.bg,cb.tx,opp.abbr,48)}
          <div class="vs-team-label">${opp.abbr}</div>
          <div class="vs-record" style="color:var(--loss)">${totalL}L</div>
        </div>
      </div>
      <div class="vs-sub">${curPerson.name} · ${curTeam.name} vs ${opp.name} · ${curSeason} · ${d.totalGames} juegos</div>
      <div class="stats-wrap">
        ${rows?`<table class="stats-table">
          <thead><tr><th>VIB</th><th>G</th><th>W</th><th>L</th><th>W%</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`:`<div class="err">Sin enfrentamientos registrados en ${curSeason}</div>`}
      </div>`;
  }catch(e){
    container.innerHTML=`<div class="err">Error: ${e.message}</div>`;
  }
}

init();
</script>
